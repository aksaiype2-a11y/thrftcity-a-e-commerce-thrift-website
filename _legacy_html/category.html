<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | ThrftCity</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="nav-container">
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            <a href="index.html" class="logo">Thrft<span>City</span></a>
            <nav class="nav-links">
                <div class="dropdown">
                    <button class="dropbtn">Men </button>
                    <div class="dropdown-content">
                        <a href="men.html">All Men</a>
                        <a href="category.html?gender=men&type=clothes">Clothes</a>
                        <a href="category.html?gender=men&type=shoes">Shoes</a>
                        <a href="category.html?gender=men&type=accessories">Accessories</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Women </button>
                    <div class="dropdown-content">
                        <a href="women.html">All Women</a>
                        <a href="category.html?gender=women&type=clothes">Clothes</a>
                        <a href="category.html?gender=women&type=shoes">Shoes</a>
                        <a href="category.html?gender=women&type=accessories">Accessories</a>
                    </div>
                </div>
            </nav>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="global-search" class="search-input" placeholder="Search..." autocomplete="off">
                <div id="search-results" class="search-results-dropdown"></div>
            </div>
            <div class="nav-icons">
                <a href="wishlist.html" class="nav-icon" title="Wishlist">
                    <i class="far fa-heart"></i>
                    <span id="wishlist-count" class="badge" style="display:none">0</span>
                </a>
                <a href="cart.html" class="nav-icon" title="Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="badge" style="display:none">0</span>
                </a>
                <a href="login.html" id="auth-btn" class="auth-btn">Login</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 2rem;">
        <h1 id="page-title" class="section-title" style="text-align: left;">All Products</h1>

        <div class="shop-layout">
            <!-- Sidebar Filters -->
            <aside class="filters-sidebar">
                <div class="filter-group">
                    <h3 class="filter-title">Gender</h3>
                    <label class="checkbox-label"><input type="checkbox" value="men" class="filter-gender"> Men</label>
                    <label class="checkbox-label"><input type="checkbox" value="women" class="filter-gender">
                        Women</label>
                </div>

                <div class="filter-group">
                    <h3 class="filter-title">Category</h3>
                    <label class="checkbox-label"><input type="checkbox" value="clothes" class="filter-category">
                        Clothes</label>
                    <label class="checkbox-label"><input type="checkbox" value="shoes" class="filter-category">
                        Shoes</label>
                    <label class="checkbox-label"><input type="checkbox" value="accessories" class="filter-category">
                        Accessories</label>
                </div>

                <div class="filter-group">
                    <h3 class="filter-title">Price Range</h3>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <input type="number" id="min-price" class="form-control" placeholder="Min"
                            style="padding: 8px;">
                        <span>-</span>
                        <input type="number" id="max-price" class="form-control" placeholder="Max"
                            style="padding: 8px;">
                    </div>
                    <button id="apply-price-btn" class="btn-primary"
                        style="width:100%; margin-top:10px; padding: 8px;">Apply</button>
                </div>
            </aside>

            <!-- Main Shop Content -->
            <div class="shop-content">
                <div class="sort-header">
                    <span id="result-count">0 Results</span>
                    <div>
                        <label style="margin-right: 10px;">Sort by:</label>
                        <select id="sort-select" class="sort-select">
                            <option value="featured">Featured / New</option>
                            <option value="low-to-high">Price: Low to High</option>
                            <option value="high-to-low">Price: High to Low</option>
                        </select>
                    </div>
                </div>

                <div id="products-grid" class="products-grid" style="padding-top: 0;">
                    <!-- Products injected here -->
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            &copy; 2026 ThrftCity. All rights reserved.
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const genderParam = urlParams.get('gender');
            const typeParam = urlParams.get('type');

            // Set initial filter checkboxes based on URL
            if (genderParam) {
                const cb = document.querySelector(`.filter-gender[value="${genderParam}"]`);
                if (cb) cb.checked = true;
            }
            if (typeParam) {
                const cb = document.querySelector(`.filter-category[value="${typeParam}"]`);
                if (cb) cb.checked = true;

                // Update title
                const titleEl = document.getElementById('page-title');
                let genderText = genderParam ? (genderParam === 'men' ? "Men's " : "Women's ") : '';
                let typeText = typeParam.charAt(0).toUpperCase() + typeParam.slice(1);
                titleEl.textContent = `${genderText}${typeText}`;
            }

            // DOM Elements
            const grid = document.getElementById('products-grid');
            const resultCount = document.getElementById('result-count');
            const sortSelect = document.getElementById('sort-select');
            const genderCheckboxes = document.querySelectorAll('.filter-gender');
            const categoryCheckboxes = document.querySelectorAll('.filter-category');
            const applyPriceBtn = document.getElementById('apply-price-btn');
            const minPriceInput = document.getElementById('min-price');
            const maxPriceInput = document.getElementById('max-price');

            function renderProducts() {
                let filtered = [...window.thrftData.products];

                // Checkboxes state
                const selectedGenders = Array.from(genderCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
                const selectedCategories = Array.from(categoryCheckboxes).filter(cb => cb.checked).map(cb => cb.value);

                if (selectedGenders.length > 0) {
                    filtered = filtered.filter(p => selectedGenders.includes(p.gender));
                }
                if (selectedCategories.length > 0) {
                    filtered = filtered.filter(p => selectedCategories.includes(p.category));
                }

                // Price filter
                const minPrice = parseFloat(minPriceInput.value);
                const maxPrice = parseFloat(maxPriceInput.value);
                if (!isNaN(minPrice)) filtered = filtered.filter(p => p.price >= minPrice);
                if (!isNaN(maxPrice)) filtered = filtered.filter(p => p.price <= maxPrice);

                // Sorting
                const sortValue = sortSelect.value;
                if (sortValue === 'low-to-high') {
                    filtered.sort((a, b) => a.price - b.price);
                } else if (sortValue === 'high-to-low') {
                    filtered.sort((a, b) => b.price - a.price);
                } else {
                    // new arrivals / featured
                    filtered.sort((a, b) => (b.isNewArrival ? 1 : 0) - (a.isNewArrival ? 1 : 0));
                }

                // Render
                resultCount.textContent = `${filtered.length} Results`;
                if (filtered.length === 0) {
                    grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><h3>No strict matches found</h3><p>Try adjusting your filters.</p></div>';
                } else {
                    grid.innerHTML = filtered.map(p => createProductCardHTML(p)).join('');
                }
            }

            // Event Listeners for filters
            genderCheckboxes.forEach(cb => cb.addEventListener('change', renderProducts));
            categoryCheckboxes.forEach(cb => cb.addEventListener('change', renderProducts));
            sortSelect.addEventListener('change', renderProducts);
            applyPriceBtn.addEventListener('click', renderProducts);

            // Initial Render
            renderProducts();
        });
    </script>
</body>

</html>
