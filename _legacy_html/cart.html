<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | ThrftCity</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        .cart-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .cart-items-container {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 2rem;
        }

        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-img {
            width: 120px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .cart-summary {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 2rem;
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #ccc;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .remove-btn {
            background: none;
            color: #ff4d4d;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
            font-size: 0.9rem;
        }

        .info-tag {
            background: var(--surface-light);
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #ccc;
            display: inline-block;
            margin-right: 5px;
        }

        @media (max-width: 900px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .cart-item {
                flex-direction: column;
            }

            .cart-img {
                width: 100%;
                height: 250px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="nav-container">
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            <a href="index.html" class="logo">Thrft<span>City</span></a>
            <nav class="nav-links">
                <div class="dropdown">
                    <button class="dropbtn">Men </button>
                    <div class="dropdown-content">
                        <a href="men.html">All Men</a>
                        <a href="category.html?gender=men&type=clothes">Clothes</a>
                        <a href="category.html?gender=men&type=shoes">Shoes</a>
                        <a href="category.html?gender=men&type=accessories">Accessories</a>
                    </div>
                </div>
                <div class="dropdown">
                    <button class="dropbtn">Women </button>
                    <div class="dropdown-content">
                        <a href="women.html">All Women</a>
                        <a href="category.html?gender=women&type=clothes">Clothes</a>
                        <a href="category.html?gender=women&type=shoes">Shoes</a>
                        <a href="category.html?gender=women&type=accessories">Accessories</a>
                    </div>
                </div>
            </nav>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="global-search" class="search-input" placeholder="Search..." autocomplete="off">
                <div id="search-results" class="search-results-dropdown"></div>
            </div>
            <div class="nav-icons">
                <a href="wishlist.html" class="nav-icon" title="Wishlist">
                    <i class="far fa-heart"></i>
                    <span id="wishlist-count" class="badge" style="display:none">0</span>
                </a>
                <a href="cart.html" class="nav-icon" style="color:var(--accent-color)" title="Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="badge" style="display:none">0</span>
                </a>
                <a href="login.html" id="auth-btn" class="auth-btn">Login</a>
            </div>
        </div>
    </header>

    <main class="container page-header">
        <h1 class="section-title">Your Cart</h1>

        <div id="cart-content">
            <!-- Rendered by JS -->
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            &copy; 2026 ThrftCity. All rights reserved.
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cartContent = document.getElementById('cart-content');

            window.renderCartView = function () {
                const cart = getCart(); // Array of IDs in Thrift mode
                if (cart.length === 0) {
                    cartContent.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-shopping-cart"></i>
                            <h3>Your Cart is Empty</h3>
                            <p style="margin-bottom: 2rem;">Looks like you haven't added anything to your cart yet.</p>
                            <a href="index.html" class="btn-primary">Start Shopping</a>
                        </div>
                    `;
                    return;
                }

                let itemsHtml = '';
                let subtotal = 0;

                cart.forEach((productId, index) => {
                    const product = window.thrftData.getProductById(productId);
                    if (!product) {
                        // Product no longer exists, clean up cart
                        removeFromCart(productId);
                        return;
                    }

                    subtotal += product.price;

                    itemsHtml += `
                        <div class="cart-item fade-in" style="animation-delay: ${index * 0.1}s">
                            <img src="${product.image}" alt="${product.name}" class="cart-img">
                            <div class="cart-item-details">
                                <div>
                                    <div style="display:flex; justify-content:space-between;">
                                        <h3><a href="product.html?id=${product.id}">${product.name}</a></h3>
                                        <div style="font-weight:bold; color:var(--accent-color);">₹${product.price}</div>
                                    </div>
                                    <div style="margin-top:10px;">
                                        <span class="info-tag">Size: ${product.availableSize}</span>
                                        <span class="info-tag">Cond: ${product.condition}</span>
                                        <span class="info-tag" style="background:var(--accent-color); color:#000; border:none; font-weight:bold;">Only 1 Left</span>
                                    </div>
                                </div>
                                <div style="display:flex; justify-content:flex-end; align-items:flex-end;">
                                    <button class="remove-btn" onclick="removeItem('${product.id}')">Remove</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                // If they removed items that didn't exist, cart might be empty now
                if (subtotal === 0) {
                    renderCartView();
                    return;
                }

                const shipping = subtotal > 2000 ? 0 : 150;
                const total = subtotal + shipping;

                cartContent.innerHTML = `
                    <div class="cart-layout">
                        <div class="cart-items-container">
                            ${itemsHtml}
                        </div>
                        <div class="cart-summary fade-in">
                            <h2 style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);">Order Summary</h2>
                            <div class="summary-row">
                                <span>Subtotal (${cart.length} item${cart.length > 1 ? 's' : ''})</span>
                                <span>₹${subtotal}</span>
                            </div>
                            <div class="summary-row">
                                <span>Shipping</span>
                                <span>${shipping === 0 ? 'Free' : '₹' + shipping}</span>
                            </div>
                            ${shipping > 0 ? `<div style="font-size:0.8rem; color:var(--accent-color); margin-bottom:10px;">Add ₹${2000 - subtotal} more for free shipping!</div>` : ''}
                            <div class="summary-total">
                                <span>Total</span>
                                <span style="color:var(--accent-color);">₹${total}</span>
                            </div>
                            <a href="orders.html?checkout=true" class="btn-primary" style="width:100%; margin-top:2rem; padding:15px; font-size:1.1rem; text-align:center;">
                                Proceed to Checkout
                            </a>
                            <div style="margin-top:20px; text-align:center; font-size:0.9rem; color:#aaa;">
                                <i class="fas fa-lock"></i> Secure Checkout
                            </div>
                        </div>
                    </div>
                `;
            };

            window.removeItem = function (id) {
                removeFromCart(id);
                showToast('Item removed from cart');
                renderCartView();
            };

            // Initial render
            renderCartView();
        });
    </script>
</body>

</html>
